---
- name: Configure Ubuntu GNOME Remote Desktop for Guacamole RDP
  hosts: localhost
  connection: local
  become: true

  vars:
    rdp_username: rdpuser
    rdp_password: rdppass

  tasks:

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - winpr-utils
          - gnome-remote-desktop
          - mesa-utils
          - mesa-vulkan-drivers
          - libgl1-mesa-dri
        state: present
        update_cache: true

    - name: Enable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'

    - name: Enable SSH locale forwarding
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?AcceptEnv'
        line: 'AcceptEnv LANG LC_* TZ'

    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Enable graphical target
      ansible.builtin.systemd:
        name: graphical.target
        enabled: true

    - name: Enable GNOME Remote Desktop system service
      ansible.builtin.systemd:
        name: gnome-remote-desktop.service
        enabled: true

    - name: Create GNOME Remote Desktop certificate directory
      ansible.builtin.file:
        path: /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop
        state: directory
        owner: gnome-remote-desktop
        group: gnome-remote-desktop
        mode: "0700"

    - name: Generate RDP TLS certificate
      ansible.builtin.command:
        cmd: >
          sudo -u gnome-remote-desktop
          winpr-makecert
          -silent
          -rdp
          -path /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls
      args:
        creates: /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt

    - name: Configure RDP TLS certificate
      ansible.builtin.command:
        cmd: >
          grdctl --system rdp set-tls-cert
          /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt

    - name: Configure RDP TLS key
      ansible.builtin.command:
        cmd: >
          grdctl --system rdp set-tls-key
          /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.key

    - name: Configure RDP username and password
      ansible.builtin.command:
        cmd: >
          grdctl --system rdp set-credentials
          {{ rdp_username }}
          {{ rdp_password }}

    - name: Allow RDP keyboard and mouse control
      ansible.builtin.command:
        cmd: grdctl --system rdp disable-view-only

    - name: Enable RDP
      ansible.builtin.command:
        cmd: grdctl --system rdp enable

    - name: Restart GNOME Remote Desktop
      ansible.builtin.systemd:
        name: gnome-remote-desktop.service
        state: restarted

    - name: Show RDP status
      ansible.builtin.command:
        cmd: grdctl --system rdp status
      register: rdp_status

    - name: Display RDP status
      ansible.builtin.debug:
        var: rdp_status.stdout
